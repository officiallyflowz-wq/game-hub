<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --bg1:#020617;
      --bg2:#081122;
      --panel:rgba(15,23,42,.72);
      --line:rgba(148,163,184,.12);
    }
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 26%),
        radial-gradient(circle at top right, rgba(34,197,94,.12), transparent 22%),
        radial-gradient(circle at bottom left, rgba(168,85,247,.10), transparent 24%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:white;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .glass{
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid var(--line);
      box-shadow: 0 22px 70px rgba(0,0,0,.38);
    }
    .card{
      background: linear-gradient(180deg, rgba(15,23,42,.96), rgba(2,6,23,.94));
      border: 1px solid rgba(255,255,255,.08);
      overflow:hidden;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .card:hover{
      transform: translateY(-5px);
      border-color: rgba(96,165,250,.42);
      box-shadow: 0 20px 50px rgba(0,0,0,.38);
    }
    .thumb{
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background:#0f172a;
    }
    .chip{
      transition:.18s ease;
      border:1px solid rgba(255,255,255,.08);
    }
    .chip.active{
      background: linear-gradient(90deg, #2563eb, #22c55e);
      color:white;
      box-shadow: 0 10px 24px rgba(37,99,235,.22);
    }
    .chip:not(.active):hover{
      background: rgba(255,255,255,.08);
    }
    .search:focus{
      outline:none;
      box-shadow: 0 0 0 4px rgba(59,130,246,.14);
      border-color: rgba(96,165,250,.7);
    }
    .btn{
      transition:.18s ease;
    }
    .btn:hover{
      transform: translateY(-1px);
    }
    .tag{
      background: rgba(96,165,250,.12);
      color:#bfdbfe;
      border: 1px solid rgba(96,165,250,.2);
    }

    /* Browser overlay */
    #browserMode{
      position: fixed;
      inset:0;
      background:black;
      z-index:60;
      display:none;
      flex-direction:column;
    }
    #browserMode iframe{
      flex:1;
      width:100%;
      background:white;
    }
    #browserMode .browserBar{
      display:flex;
      gap:0.5rem;
      padding:0.5rem;
      background:#1e293b;
    }
    #browserMode input{
      flex:1;
      padding:0.5rem;
      border-radius:0.5rem;
      border:none;
    }
    #browserMode button{
      padding:0.5rem 1rem;
      border-radius:0.5rem;
      border:none;
      cursor:pointer;
      background:#2563eb;
      color:white;
      font-weight:600;
    }
  </style>
</head>
<body>

  <!-- GATE -->
  <div id="gate" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 px-4">
    <div class="glass w-full max-w-md rounded-3xl p-6 sm:p-8">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full tag text-sm mb-4">
        <span class="w-2 h-2 rounded-full bg-green-400"></span>
        Access required
      </div>
      <h1 class="text-3xl sm:text-4xl font-black">Enter Code</h1>
      <p class="mt-2 text-slate-400">Type the code to open Game Hub.</p>

      <input id="codeInput" type="password" placeholder="Enter code"
        class="mt-5 w-full rounded-2xl border border-white/10 bg-slate-950/80 px-4 py-3 text-white placeholder-slate-500 search">

      <button id="submitCode"
        class="btn mt-4 w-full rounded-2xl bg-blue-600 px-4 py-3 font-semibold text-white hover:bg-blue-500">
        Unlock
      </button>

      <p id="message" class="mt-4 text-sm text-rose-400"></p>
      <p id="cooldownText" class="mt-2 hidden text-sm text-amber-300"></p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <header class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8">
      <div class="glass rounded-3xl p-6 sm:p-8 flex justify-between items-end gap-6">
        <div>
          <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full tag text-sm mb-4">
            <span class="w-2 h-2 rounded-full bg-green-400"></span>
            Browser Game Picks
          </div>
          <h1 class="text-4xl sm:text-5xl font-black tracking-tight">Game <span class="text-blue-400">Hub</span></h1>
          <p class="text-slate-300 mt-3 max-w-2xl">
            Clean, fast, and polished game tiles with search, filters, and working launch links.
          </p>
        </div>

        <div class="flex flex-col w-full lg:max-w-md gap-2">
          <label for="search" class="block text-sm text-slate-300 mb-2">Search games</label>
          <input id="search" class="search w-full px-4 py-3 rounded-2xl bg-slate-950/80 border border-white/10 text-white placeholder-slate-500" placeholder="Type a game name..." />
          <!-- ✅ Browser button added -->
          <button onclick="openBrowser()" class="mt-2 btn w-full rounded-2xl bg-green-600 px-4 py-3 font-semibold text-white hover:bg-green-500">
            Browser
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 pb-12">
      <div class="flex flex-wrap gap-3 mb-6">
        <button class="chip active btn px-4 py-2 rounded-full bg-blue-600/90" data-filter="all">All</button>
        <button class="chip btn px-4 py-2 rounded-full bg-slate-800/80" data-filter="sandbox">Sandbox</button>
        <button class="chip btn px-4 py-2 rounded-full bg-slate-800/80" data-filter="fps">FPS</button>
        <button class="chip btn px-4 py-2 rounded-full bg-slate-800/80" data-filter="arcade">Arcade</button>
        <button class="chip btn px-4 py-2 rounded-full bg-slate-800/80" data-filter="strategy">Strategy</button>
      </div>

      <div id="stats" class="text-sm text-slate-400 mb-4"></div>
      <div id="games" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

      <div id="empty" class="hidden glass rounded-3xl p-10 text-center mt-6">
        <h2 class="text-2xl font-bold">No games found</h2>
        <p class="text-slate-400 mt-2">Try a different search or category.</p>
      </div>
    </main>
  </div>

  <!-- 🌐 Browser overlay -->
  <div id="browserMode">
    <div class="browserBar">
      <button onclick="goBack()">←</button>
      <input id="urlBar" placeholder="Enter URL">
      <button onclick="go()">Go</button>
      <button onclick="closeBrowser()">X</button>
    </div>
    <iframe id="viewer"></iframe>
  </div>

<script>
  const ACCESS_CODE = atob("MTIzNA==");
  const LOCK_KEY = "gamehub_lock_until";
  const lockMs = 5 * 60 * 1000;

  const gate = document.getElementById("gate");
  const app = document.getElementById("app");
  const input = document.getElementById("codeInput");
  const button = document.getElementById("submitCode");
  const message = document.getElementById("message");
  const cooldownText = document.getElementById("cooldownText");

  const el = document.getElementById("games");
  const search = document.getElementById("search");
  const empty = document.getElementById("empty");
  const stats = document.getElementById("stats");
  let filter = "all";

  const browserMode = document.getElementById("browserMode");
  const viewer = document.getElementById("viewer");
  const urlBar = document.getElementById("urlBar");
  let historyStack = [];

  function openBrowser(){ browserMode.style.display="flex"; }
  function closeBrowser(){ browserMode.style.display="none"; }
  function go() {
  let url = document.getElementById("urlBar").value.trim();
  if (!url.startsWith("http")) url = "https://" + url;
  document.getElementById("viewer").src = "/proxy?url=" + encodeURIComponent(url);
}
  function goBack(){
    historyStack.pop();
    let last = historyStack[historyStack.length-1];
    if(last){ viewer.src=last; urlBar.value=last; }
  }

  function getRemainingLockMs() {
    const until = Number(localStorage.getItem(LOCK_KEY) || 0);
    return Math.max(0, until - Date.now());
  }

  function formatTime(ms) {
    const total = Math.ceil(ms / 1000);
    const m = Math.floor(total / 60);
    const s = total % 60;
    return `${m}:${String(s).padStart(2, "0")}`;
  }

  function showCooldown() {
    gate.classList.remove("hidden");
    app.classList.add("hidden");
    message.textContent = "Wrong code. Access is locked.";
    cooldownText.classList.remove("hidden");

    const tick = () => {
      const remaining = getRemainingLockMs();
      if (remaining <= 0) {
        localStorage.removeItem(LOCK_KEY);
        cooldownText.classList.add("hidden");
        message.textContent = "";
        return;
      }
      cooldownText.textContent = `Locked for ${formatTime(remaining)}`;
      setTimeout(tick, 1000);
    };
    tick();
  }

  function unlock() {
    gate.classList.add("hidden");
    app.classList.remove("hidden");
    render();
  }

  const fallback = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
        <rect width="1200" height="675" fill="#0f172a"/>
        <text x="60" y="340" fill="#e2e8f0" font-size="58" font-family="Arial" font-weight="700">Game Hub</text>
        <text x="60" y="400" fill="#94a3b8" font-size="30" font-family="Arial">Image unavailable</text>
      </svg>
  `);

  const gamesData = [
    {name:"Vectaria", cat:"sandbox", img:"vecteria.png", url:"https://vectaria.io/", desc:"Minecraft-like multiplayer world."},
    {name:"Blockops", cat:"fps", img:"blocops.jpeg", url:"http://blokops.io/", desc:"Block-style shooting game."},
    {name:"Fields of Fury", cat:"fps", img:"fieldsoffury.jpeg", url:"http://fieldsoffury.io/", desc:"Fast multiplayer FPS action."},
    {name:"Blockpost", cat:"fps", img:"blockpost.jpeg", url:"https://playblockpost.pages.dev/", desc:"Voxel multiplayer shooter."},
    {name:"Slope", cat:"arcade", img:"slope.jpeg", url:"https://playslope.pages.dev/", desc:"Fast neon ball runner."},
    {name:"Burrito Bison", cat:"arcade", img:"burrito.jpeg", url:"https://playburritobison.pages.dev/", desc:"Launch-and-upgrade arcade game."},
    {name:"Harvest Sim", cat:"strategy", img:"harvestsim.jpeg", url:"https://playharvestsim.pages.dev/", desc:"Relaxed farming/sim style."},
    {name:"GeoDash", cat:"arcade", img:"dash.jpeg", url:"https://playgeodash.pages.dev/", desc:"Rhythm platforming challenge."},
    {name:"Final Earth", cat:"strategy", img:"earth.png", url:"https://playfinalearth.pages.dev/", desc:"Build and manage a world."}
  ];

  function card(g){
    return `
      <a href="${g.url}" target="_blank" rel="noopener noreferrer" class="card rounded-3xl group">
        <img src="${g.img}" class="thumb w-full" loading="lazy" onerror="this.onerror=null;this.src='${fallback}'" alt="${g.name}">
        <div class="p-4">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h2 class="text-lg font-semibold group-hover:text-blue-300 transition">${g.name}</h2>
              <p class="text-sm text-slate-400 mt-1">${g.desc}</p>
            </div>
            <span class="text-xs px-2 py-1 rounded-full bg-white/5 border border-white/10 text-slate-300 uppercase">${g.cat}</span>
          </div>
          <div class="mt-4 inline-flex items-center gap-2 text-sm text-blue-300">
            <span>Open game</span><span>→</span>
          </div>
        </div>
      </a>
    `;
  }

  function render(){
    const q = search.value.trim().toLowerCase();
    const list = gamesData.filter(g => (filter === "all" || g.cat === filter) && g.name.toLowerCase().includes(q));
    el.innerHTML = list.map(card).join("");
    empty.classList.toggle("hidden", list.length !== 0);
    stats.textContent = `${list.length} game${list.length === 1 ? "" : "s"} shown`;
  }

  document.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach(b => {
        b.classList.remove("active", "bg-blue-600/90");
        if (!b.classList.contains("active")) b.classList.add("bg-slate-800/80");
      });
      btn.classList.add("active", "bg-blue-600/90");
      btn.classList.remove("bg-slate-800/80");
      filter = btn.dataset.filter;
      render();
    });
  });

  search.addEventListener("input", render);

  button.addEventListener("click", () => {
    if (getRemainingLockMs() > 0) {
      showCooldown();
      return;
    }
    if (input.value.trim() === ACCESS_CODE) {
      localStorage.removeItem(LOCK_KEY);
      unlock();
    } else {
      localStorage.setItem(LOCK_KEY, String(Date.now() + lockMs));
      showCooldown();
    }
  });

  input.addEventListener("keydown", (e) => { if(e.key==="Enter") button.click(); });
  if(getRemainingLockMs()>0) showCooldown();
  else { gate.classList.remove("hidden"); app.classList.add("hidden"); }

</script>

</body>
</html>
